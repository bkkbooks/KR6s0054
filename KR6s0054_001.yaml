body:
  text: 依門神母及金光明經略述毗沙門功德天爾時世尊左香山禪定名於初夜分時三十三天衆及毗沙門天王受記下來將諸音樂香花供養世尊供養訖世尊即與毗沙門天王受記故於來世當得作佛號泥勿羅遮毗沙門天王得受記已即於佛前發大誓願願我未成佛已來當作大力藥叉王護此南閻浮提世界一切衆生及國王大臣作禮王子合國人民若男若女願信受金光明四部之衆為我轉讀於其國內所有曾覺不成人民飢餓疾病流行鄰國怨敵遞相討罰暴雨惡風不振時節日月博蝕井內發聲星流動地國內民人受諸苦惱有如是等無量百千災怪惡事起時世尊彼人王願護國王常於國內顯敞之據香水灑地置一道場為我讀一字師講誦金光明經我於是時無量百千天神并護國王諸舊善神及我眷屬各自隱形為作護助今彼怨敵自然降伏憂愁疾疫亦令除差所有軍兵悉皆勇健國內人民受請使樂世尊告曰是事實不時毗沙門天王答世尊曰若有人王佐如是請召我時如我不列彼處不護其王願莫見大國兄弟願破作七分見未來諸佛發是誓已便歸本天至天時己大衆俱集阿難從座而起偏袒右肩合掌恭敬白佛言世尊我是凡夫不知聖意作夜分時有天香花著大蕃沙州釋門教法和尚洪辨修功德大蕃國字監博士憲驥敕河西歸節度
